<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>X3DOM</title>

  <!-- X3DOM -->
  <link rel="stylesheet" href="https://www.x3dom.org/release/x3dom.css">
  <script src="https://www.x3dom.org/release/x3dom.js"></script>

  <!-- D3 v7 -->
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      height: 100vh;
    }

    /* ── Hide X3DOM built-in UI ── */
    #x3dom-navi, .x3dom-navi,
    .x3dom-progress, .x3dom-logContainer,
    [id^="x3dom-"] > div { display: none !important; }

    /* ── Left: 3D viewer ── */
    #left-panel {
      flex: none;
      width: 80%;
      height: 100vh;
      position: relative;
    }
    #x3d {
      width: 100%;
      height: 100%;
      display: block;
    }

    #model-bottom-bar {
      position: absolute;
      left: 50%;
      bottom: 18px;
      width: 34%;
      max-width: 300px;
      min-width: 150px;
      height: 12px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: rgba(90, 90, 90, 0.78);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.22);
      transition: background 0.18s ease, box-shadow 0.18s ease;
      z-index: 5;
      cursor: pointer;
    }

    #model-bottom-bar:hover {
      background: rgba(135, 135, 135, 0.9);
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.28);
    }

    #model-bottom-bar:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.75);
      outline-offset: 5px;
    }

    #feature-lights {
      position: absolute;
      left: 50%;
      bottom: 44px;
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 10px 13px;
      transform: translate(-50%, 10px);
      border-radius: 18px;
      background: rgba(28, 28, 32, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.32);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 6;
    }

    #feature-lights.is-open {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, 0);
    }

    .feature-light {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.32);
      box-shadow: inset 0 1px 3px rgba(255, 255, 255, 0.36),
                  0 2px 8px rgba(0, 0, 0, 0.28);
    }

    .feature-light:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.75);
      outline-offset: 4px;
    }

    .feature-light.is-active {
      box-shadow: inset 0 1px 3px rgba(255, 255, 255, 0.45),
                  0 0 0 3px rgba(255, 255, 255, 0.42),
                  0 3px 10px rgba(0, 0, 0, 0.32);
    }

    .feature-light:nth-child(1) { background: #e35d5d; }
    .feature-light:nth-child(2) { background: #e8c755; }
    .feature-light:nth-child(3) { background: #62c76b; }
    .feature-light:nth-child(4) { background: #55a7e8; }
    .feature-light:nth-child(5) { background: #b875e8; }
    .feature-light[data-feature="ground-projection-copy"] { background: #e35d5d; }

    /* ── Feature count date window ── */
    .feature-count-control {
      display: flex;
      align-items: center;
      gap: 3px;
      margin-left: 4px;
      padding-left: 10px;
      border-left: 1px solid rgba(255, 255, 255, 0.2);
    }

    .feature-count-control.is-left {
      margin-left: 0;
      margin-right: 4px;
      padding-left: 0;
      padding-right: 10px;
      border-left: 0;
      border-right: 1px solid rgba(255, 255, 255, 0.2);
    }

    .feature-count-control input[type="number"] {
      position: absolute;
      width: 42px;
      height: 26px;
      opacity: 0;
      pointer-events: none;
    }

    .date-stepper {
      display: grid;
      grid-template-rows: 12px 24px 12px;
      justify-items: center;
      align-items: center;
    }

    .date-stepper button {
      width: 28px;
      height: 12px;
      border: 0;
      background: transparent;
      color: rgba(255, 255, 255, 0.68);
      font: 800 9px/1 'Segoe UI', sans-serif;
      cursor: pointer;
      padding: 0;
    }

    .date-stepper button:hover,
    .date-stepper button:focus-visible {
      color: #ffffff;
      outline: none;
    }

    .date-window {
      position: relative;
      width: 32px;
      height: 24px;
      overflow: hidden;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.34);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(10, 10, 14, 0.32));
      box-shadow: inset 0 1px 4px rgba(255, 255, 255, 0.22),
                  inset 0 -6px 12px rgba(0, 0, 0, 0.24),
                  0 2px 8px rgba(0, 0, 0, 0.28);
    }

    .date-window::before,
    .date-window::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 8px;
      z-index: 2;
      pointer-events: none;
    }

    .date-window::before {
      top: 0;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.42), transparent);
    }

    .date-window::after {
      bottom: 0;
      background: linear-gradient(0deg, rgba(0, 0, 0, 0.42), transparent);
    }

    .date-wheel {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #ffffff;
      font: 800 13px/1 'Segoe UI', sans-serif;
      font-variant-numeric: tabular-nums;
      transform: translateY(0);
    }

    .date-stepper.is-rolling-up .date-wheel {
      animation: date-roll-up 180ms ease-out;
    }

    .date-stepper.is-rolling-down .date-wheel {
      animation: date-roll-down 180ms ease-out;
    }

    @keyframes date-roll-up {
      from { transform: translateY(100%); opacity: 0.25; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes date-roll-down {
      from { transform: translateY(-100%); opacity: 0.25; }
      to { transform: translateY(0); opacity: 1; }
    }

    #resizer {
      flex: none;
      width: 5px;
      cursor: col-resize;
      background: #555;
      transition: background .15s;
      z-index: 10;
      touch-action: none;
    }
    #resizer:hover, #resizer.dragging { background: #aaa; }

    body.resizing #x3d,
    body.resizing #graph-svg {
      pointer-events: none;
    }

    /* ── Right: D3 graph ── */
    #right-panel {
      flex: 1;
      height: 100vh;
      background: #1a1a2e;
      position: relative;
      overflow: hidden;
    }
    #graph-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .graph-toggle {
      position: absolute;
      top: 12px;
      z-index: 4;
      width: 34px;
      height: 34px;
      border: 1px solid #4a5568;
      border-radius: 6px;
      background: #2d3748;
      color: #e2e8f0;
      font: 700 13px 'Segoe UI', sans-serif;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.28);
    }

    #bbox-toggle {
      left: 12px;
    }

    #model-visibility-toggle {
      left: 52px;
    }

    .graph-toggle:hover {
      background: #3b4a60;
      border-color: #63b3ed;
    }

    .graph-toggle:focus-visible {
      outline: 2px solid #63b3ed;
      outline-offset: 3px;
    }

    .graph-toggle.is-active {
      background: #e94560;
      border-color: #fbd38d;
      color: #ffffff;
    }

    /* ── Graph elements ── */
    .link { cursor: pointer; }

    .link .link-hit {
      stroke: transparent;
      stroke-width: 20;
    }
    .link .link-vis {
      stroke: #4a5568;
      stroke-width: 2;
      pointer-events: none;
    }
    .link:hover .link-vis,
    .link.selected .link-vis { stroke: #e94560; stroke-width: 3; }

    .node circle {
      fill: #2d3748;
      stroke: #63b3ed;
      stroke-width: 2;
      cursor: grab;
    }
    .node circle:active { cursor: grabbing; }
    .node circle:hover  { fill: #2b6cb0; }
    .node.selected circle { fill: #e94560; stroke: #fff; }

    .node text {
      fill: #e2e8f0;
      font-size: 11px;
      font-family: 'Segoe UI', sans-serif;
      pointer-events: none;
      user-select: none;
    }

    #drag-line {
      stroke: #e94560;
      stroke-width: 2;
      stroke-dasharray: 6 3;
      pointer-events: none;
    }

    /* ── Mode hint (bottom-left of graph panel) ── */
    #mode-hint {
      position: absolute;
      bottom: 68px;
      left: 10px;
      font-size: 11px;
      font-family: 'Segoe UI', sans-serif;
      color: #718096;
      pointer-events: none;
    }

    .node-nav {
      position: absolute;
      left: 50%;
      bottom: 18px;
      display: flex;
      gap: 10px;
      transform: translateX(-50%);
      z-index: 4;
    }

    .node-nav button {
      min-width: 72px;
      height: 34px;
      border: 1px solid #4a5568;
      border-radius: 6px;
      background: #2d3748;
      color: #e2e8f0;
      font: 600 13px 'Segoe UI', sans-serif;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.28);
    }

    .node-nav button:hover {
      background: #3b4a60;
      border-color: #63b3ed;
    }

    .node-nav button:focus-visible {
      outline: 2px solid #63b3ed;
      outline-offset: 3px;
    }

    .node-nav button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    /* ── X3D hover tooltip ── */
    #x3d-tooltip {
      display: none;
      position: fixed;
      background: rgba(10, 10, 30, 0.92);
      color: #e2e8f0;
      padding: 6px 13px;
      border-radius: 7px;
      border: 1px solid #4a5568;
      font-size: 13px;
      font-family: 'Segoe UI', sans-serif;
      pointer-events: none;
      z-index: 1000;
      white-space: nowrap;
      box-shadow: 0 2px 10px rgba(0,0,0,.6);
      line-height: 1.5;
    }
    #x3d-tooltip .tt-type {
      font-size: 15px;
      font-weight: 600;
      color: #fbd38d;
    }
    #x3d-tooltip .tt-id {
      font-size: 11px;
      color: #a0aec0;
    }
  </style>
</head>

<body>

  <!-- Left: 3D model (unchanged) -->
  <div id="left-panel">
    <x3d id="x3d">
      <scene>
        <navigationInfo type="EXAMINE" headlight="true" speed="1"></navigationInfo>
        <viewpoint position="0 -11.642880 50" orientation="0 0 0 0" fieldOfView="0.6"></viewpoint>
        <background skyColor="0.75 0.75 0.75"></background>

        <Environment SSAO="true" SSAOradius="0.5"></Environment>

        <transform id="model-ground-plane" translation="0 -20 0">
          <shape>
            <appearance>
              <material diffuseColor="0.35 0.35 0.35" transparency="0.88"></material>
            </appearance>
            <box size="1000 0.01 1000"></box>
          </shape>
        </transform>

        <!-- geometry injected by fetch below -->
      </scene>
    </x3d>
    <div id="feature-lights" aria-hidden="true">
      <label class="feature-count-control is-left" title="材等">
        <input id="reserved-feature-count" type="number" min="1" max="8" step="1" value="8" aria-label="材等">
        <span class="date-stepper" id="reserved-feature-count-stepper" role="spinbutton" tabindex="0" aria-label="材等" aria-valuemin="1" aria-valuemax="8" aria-valuenow="8">
          <button class="date-step date-step-up" type="button" aria-label="提高材等">▲</button>
          <span class="date-window" aria-hidden="true">
            <span class="date-wheel">8</span>
          </span>
          <button class="date-step date-step-down" type="button" aria-label="降低材等">▼</button>
        </span>
      </label>
      <span class="feature-light" role="button" tabindex="0" data-feature="unit-grid" title="6x6x6 立方格線"></span>
      <span class="feature-light" role="button" tabindex="0" data-feature="axis-markers" title="XYZ 軸標記"></span>
      <span class="feature-light" role="button" tabindex="0" data-feature="axis-layer-planes" title="XYZ 軸切層"></span>
      <span class="feature-light" role="button" tabindex="0" data-feature="ground-projection" title="地面投影"></span>
      <span class="feature-light" role="button" tabindex="0" data-feature="ground-projection-copy" title="剖面空區"></span>
      <label class="feature-count-control" title="展示數量">
        <input id="feature-count" type="number" min="1" max="8" step="1" value="3" aria-label="展示數量">
        <span class="date-stepper" id="feature-count-stepper" role="spinbutton" tabindex="0" aria-label="展示數量" aria-valuemin="1" aria-valuemax="8" aria-valuenow="3">
          <button class="date-step date-step-up" type="button" aria-label="增加展示數量">▲</button>
          <span class="date-window" aria-hidden="true">
            <span class="date-wheel">3</span>
          </span>
          <button class="date-step date-step-down" type="button" aria-label="減少展示數量">▼</button>
        </span>
      </label>
    </div>
    <div id="model-bottom-bar" role="button" tabindex="0" aria-label="功能選單" aria-expanded="false"></div>
  </div>

  <!-- Resizer -->
  <div id="resizer"></div>

  <!-- Right: D3 graph editor -->
  <div id="right-panel">
    <button id="bbox-toggle" class="graph-toggle" type="button" aria-pressed="false" title="Bounding boxes">BB</button>
    <button id="model-visibility-toggle" class="graph-toggle" type="button" aria-pressed="false" title="只保留 bounding box">AA</button>
    <svg id="graph-svg"></svg>
    <div id="mode-hint"></div>
    <div class="node-nav" aria-label="Node navigation">
      <button id="layer-back" type="button">Back</button>
      <button id="layer-next" type="button">Next</button>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="graph.js"></script>

</body>
</html>

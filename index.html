<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title id="page-title"></title>

  <link rel="stylesheet" href="https://www.x3dom.org/release/x3dom.css">
  <script src="https://www.x3dom.org/release/x3dom.js"></script>

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      display: flex;
      flex-direction: column;
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      background: #fbf8ef;
      color: #29251f;
    }

    #site-header {
      flex: none;
      height: 92px;
      min-height: 76px;
      padding: 0 clamp(24px, 5vw, 72px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(180deg, rgba(241, 234, 220, 0.96), rgba(251, 248, 239, 0.84));
      border-bottom: 1px solid rgba(146, 128, 94, 0.18);
      font-size: clamp(18px, 2.2vw, 28px);
      font-weight: 800;
      letter-spacing: 0.08em;
      color: #26221c;
      position: relative;
      z-index: 4;
    }

    #site-header::after {
      content: "Digital Timber Archive";
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #8c7b61;
    }

    main {
      flex: 1;
      position: relative;
      min-height: 0;
      overflow: hidden;
      isolation: isolate;
      background:
        linear-gradient(90deg, rgba(251, 248, 239, 0.92) 0%, rgba(251, 248, 239, 0.62) 38%, rgba(251, 248, 239, 0.12) 68%),
        repeating-linear-gradient(90deg, rgba(130, 111, 78, 0.05) 0 1px, transparent 1px 96px);
    }

    #showcase {
      position: absolute;
      inset: -2% 0 0 0;
      z-index: 0;
    }

    #showcase x3d {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* hide x3dom's built-in overlay UI so it reads as a clean showcase */
    #showcase .x3dom-navi, #showcase .x3dom-progress, #showcase .x3dom-logContainer {
      display: none !important;
    }

    #hero-copy {
      position: absolute;
      z-index: 2;
      left: clamp(24px, 6vw, 88px);
      top: clamp(24px, 8vh, 74px);
      width: min(440px, calc(100% - 48px));
      pointer-events: none;
    }

    #hero-copy .eyebrow {
      margin: 0 0 14px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #8c7b61;
    }

    #hero-copy h1 {
      margin: 0;
      font-size: clamp(34px, 5.6vw, 74px);
      line-height: 0.98;
      font-weight: 850;
      letter-spacing: 0;
      color: #27231d;
    }

    #hero-copy p {
      width: min(360px, 100%);
      margin: 20px 0 0;
      font-size: clamp(14px, 1.5vw, 17px);
      line-height: 1.8;
      color: #655947;
    }

    #hero-copy .rule {
      width: 88px;
      height: 2px;
      margin-top: 24px;
      background: #b78a48;
    }

    #links {
      position: absolute;
      z-index: 3;
      left: clamp(20px, 5vw, 72px);
      right: clamp(20px, 5vw, 72px);
      bottom: clamp(22px, 5.8vh, 56px);
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: clamp(14px, 2vw, 24px);
      pointer-events: none;
    }

    .home-link {
      pointer-events: auto;
      width: min(28%, 320px);
      min-width: 210px;
      min-height: 132px;
      padding: 20px 22px;
      border: 1px solid rgba(154, 133, 96, 0.24);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.86);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: space-between;
      overflow: hidden;
      text-decoration: none;
      box-shadow: 0 18px 40px rgba(78, 64, 39, 0.14);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      position: relative;
    }

    .home-link::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 3px;
      background: #b78a48;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.18s ease;
      z-index: 2;
    }

    .home-link::after {
      content: "";
      position: absolute;
      inset: 0;
      background-position: calc(50% + 10px) center;
      background-repeat: no-repeat;
      background-size: cover;
      opacity: 0.5;
      -webkit-mask-image: linear-gradient(90deg, transparent 0%, transparent 50%, #000 100%);
      mask-image: linear-gradient(90deg, transparent 0%, transparent 50%, #000 100%);
      pointer-events: none;
      z-index: 0;
    }

    .home-link:nth-child(1)::after {
      background-image: url("fig/chaiqi.png");
      background-position: calc(50% + 60px) center;
    }

    .home-link:nth-child(2)::after {
      background-image: url("fig/viewer.png");
      background-position: calc(50% + 30px) center;
    }

    .home-link:nth-child(3)::after {
      background-image: url("fig/palace-view.png");
    }

    .home-link:hover {
      transform: translateY(-6px);
      border-color: rgba(183, 138, 72, 0.56);
      background: rgba(255, 253, 248, 0.96);
      box-shadow: 0 24px 54px rgba(78, 64, 39, 0.2);
    }

    .home-link:hover::before {
      transform: scaleX(1);
    }

    .home-link:focus-visible {
      outline: 3px solid #568bbe;
      outline-offset: 4px;
    }

    .link-kicker {
      position: relative;
      z-index: 1;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #9a8560;
    }

    .link-title {
      position: relative;
      z-index: 1;
      margin-top: 10px;
      font-size: clamp(18px, 2vw, 24px);
      line-height: 1.2;
      font-weight: 800;
      color: #29251f;
      display: block;
    }

    .link-note {
      position: relative;
      z-index: 1;
      margin-top: 12px;
      font-size: 13px;
      line-height: 1.55;
      color: #70614d;
      display: block;
    }

    @media (max-width: 920px) {
      #site-header {
        height: 78px;
      }

      #site-header::after {
        display: none;
      }

      #hero-copy {
        top: 24px;
      }

      #links {
        justify-content: center;
        flex-wrap: wrap;
      }

      .home-link {
        width: min(100%, 280px);
        min-width: 0;
        min-height: 118px;
      }
    }

    @media (max-width: 640px) {
      #site-header {
        justify-content: center;
        padding: 0 18px;
        text-align: center;
      }

      #hero-copy {
        left: 20px;
        top: 18px;
      }

      #hero-copy p,
      #hero-copy .rule {
        display: none;
      }

      #links {
        display: grid;
        grid-template-columns: 1fr;
        bottom: 16px;
      }

      .home-link {
        width: 100%;
        min-height: 86px;
        padding: 14px 16px;
      }

      .link-note {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <section id="hero-copy" aria-label="首頁介紹">
      <p class="eyebrow">Timber Structure Study</p>
      <h1>枓栱與木作</h1>
      <p>以三維模型理解傳統木構</p>
      <div class="rule" aria-hidden="true"></div>
    </section>
    <div id="showcase">
      <x3d>
        <scene>
          <navigationInfo type="NONE" headlight="true"></navigationInfo>
          <viewpoint position="0 0 12" orientation="0 0 0 0" fieldOfView="0.7"></viewpoint>
          <background skyColor="0.984 0.973 0.937"></background>

          <transform id="palace-spin" scale="0.3 0.3 0.3">
            <transform id="palace-model"></transform>
          </transform>

          <!-- ponytail: rotation is declarative X3D (TimeSensor + OrientationInterpolator), no JS loop needed.
               Spins clockwise (viewed from +Z); flip key values to reverse direction. -->
          <timeSensor id="spin-clock" cycleInterval="32" loop="true"></timeSensor>
          <OrientationInterpolator id="spin-orientation"
            key="0 0.25 0.5 0.75 1"
            keyValue="0 1 0 0, 0 1 0 -1.5708, 0 1 0 -3.1416, 0 1 0 -4.7124, 0 1 0 -6.2832">
          </OrientationInterpolator>
          <ROUTE fromnode="spin-clock" fromfield="fraction_changed" tonode="spin-orientation" tofield="set_fraction"></ROUTE>
          <ROUTE fromnode="spin-orientation" fromfield="value_changed" tonode="palace-spin" tofield="set_rotation"></ROUTE>
        </scene>
      </x3d>
    </div>
    <div id="links">
      <a class="home-link" href="chaiqi.html" aria-label="枓栱模型">
        <span>
          <span class="link-kicker">Assembly</span>
          <span class="link-title">枓栱模型</span>
          <span class="link-note">查看構件拆解、格線與組裝關係</span>
        </span>
      </a>
      <a class="home-link" href="viewer.html" aria-label="構件瀏覽">
        <span>
          <span class="link-kicker">Catalogue</span>
          <span class="link-title">構件瀏覽</span>
          <span class="link-note">切換不同 X3D 模型並檢視細部</span>
        </span>
      </a>
      <a class="home-link" href="palace-view.html" aria-label="大殿模型">
        <span>
          <span class="link-kicker">Facade</span>
          <span class="link-title">大殿模型</span>
          <span class="link-note">搭配輔助圖片校對大殿立面</span>
        </span>
      </a>
    </div>
  </main>

  <script>
    // 改網站名稱只需改這裡
    const SITE_NAME = '網站名稱';

    document.getElementById('page-title').textContent = SITE_NAME;
    document.getElementById('site-header').textContent = SITE_NAME;

    // 木頭色與 viewer.js 的 DEFAULT_WOOD_COLOR 一致
    const WOOD_COLOR = '0.450 0.280 0.140';

    const PALACE_MODEL_URL = 'X3D/Palace1-1-viewer.x3d';

    function localNameEquals(node, name) {
      return node?.localName?.toLowerCase() === name;
    }

    function childByLocalName(node, name) {
      return Array.from(node?.children || []).find(child => localNameEquals(child, name));
    }

    function createX3dElement(doc, sourceNode, tagName) {
      return sourceNode?.namespaceURI
        ? doc.createElementNS(sourceNode.namespaceURI, tagName)
        : doc.createElement(tagName);
    }

    function applyWoodMaterials(x3dDoc) {
      const shapes = Array.from(x3dDoc.getElementsByTagName('*'))
        .filter(node => localNameEquals(node, 'shape'));

      shapes.forEach(shape => {
        let appearance = childByLocalName(shape, 'appearance');

        if (!appearance) {
          appearance = createX3dElement(x3dDoc, shape, 'Appearance');
          shape.insertBefore(appearance, shape.firstChild);
        }

        let material = childByLocalName(appearance, 'material');

        if (!material) {
          material = createX3dElement(x3dDoc, appearance, 'Material');
          appearance.insertBefore(material, appearance.firstChild);
        }

        material.setAttribute('diffuseColor', WOOD_COLOR);
        material.setAttribute('ambientIntensity', '0.000');
        material.setAttribute('specularColor', '0.401 0.401 0.401');
        material.setAttribute('shininess', '0.500');
      });
    }

    function importX3dSceneChildren(x3dDoc, wrapper) {
      const srcScene = Array.from(x3dDoc.getElementsByTagName('*'))
        .find(node => localNameEquals(node, 'scene'));
      if (!srcScene) throw new Error('X3D has no Scene element');

      Array.from(srcScene.children).forEach(child => {
        if (['navigationinfo', 'background', 'viewpoint'].includes(child.localName.toLowerCase())) return;
        wrapper.appendChild(document.importNode(child, true));
      });
    }

    function reloadX3dom() {
      if (window.x3dom) x3dom.reload();
    }

    async function loadPalaceModel() {
      const wrapper = document.getElementById('palace-model');
      if (!wrapper) return;

      const response = await fetch(PALACE_MODEL_URL);
      if (!response.ok) throw new Error(`${PALACE_MODEL_URL} returned ${response.status}`);

      const x3dDoc = new DOMParser().parseFromString(await response.text(), 'application/xml');
      if (x3dDoc.querySelector('parsererror')) throw new Error(`${PALACE_MODEL_URL} could not be parsed`);

      applyWoodMaterials(x3dDoc);
      importX3dSceneChildren(x3dDoc, wrapper);
      reloadX3dom();
    }

    // ponytail: the Palace1-1-viewer.x3d file is 50MB+, so its bounding volume
    // isn't ready right when 'load' fires. viewer.js already solves this for the
    // same file by polling getVolume() every 500ms (up to 16s) — same approach here.
    function setupPalaceShowcase() {
      const transform = document.getElementById('palace-spin');
      const modelTransform = document.getElementById('palace-model');
      let centered = false;

      function centerRotationOnModel() {
        if (centered) return true;
        const volume = modelTransform._x3domNode?.getVolume?.();
        if (!volume || !volume.isValid?.()) return false;
        const min = new x3dom.fields.SFVec3f(0, 0, 0);
        const max = new x3dom.fields.SFVec3f(0, 0, 0);
        volume.getBounds(min, max);
        const centerX = (min.x + max.x) / 2;
        const centerY = (min.y + max.y) / 2;
        const centerZ = (min.z + max.z) / 2;
        const height = max.y - min.y;
        modelTransform.setAttribute('translation', `${-centerX} ${-centerY + height * 0.25} ${-centerZ}`);
        transform.setAttribute('center', '0 0 0');
        centered = true;
        return true;
      }

      const startedAt = performance.now();
      (function poll() {
        const centerDone = centerRotationOnModel();
        if (centerDone || performance.now() - startedAt > 16000) return;
        window.setTimeout(poll, 500);
      })();
    }

    loadPalaceModel()
      .then(setupPalaceShowcase)
      .catch(error => {
        console.error('Home palace load failed:', error);

        const wrapper = document.getElementById('palace-model');
        if (!wrapper) return;
        const inline = document.createElement('inline');
        inline.setAttribute('url', PALACE_MODEL_URL);
        wrapper.appendChild(inline);
        reloadX3dom();
        setupPalaceShowcase();
      });
  </script>
</body>
</html>

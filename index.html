<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>X3DOM</title>

  <!-- X3DOM -->
  <link rel="stylesheet" href="https://www.x3dom.org/release/x3dom.css">
  <script src="https://www.x3dom.org/release/x3dom.js"></script>

  <!-- D3 v7 -->
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      height: 100vh;
    }

    /* ── Hide X3DOM built-in UI ── */
    #x3dom-navi, .x3dom-navi,
    .x3dom-progress, .x3dom-logContainer,
    [id^="x3dom-"] > div { display: none !important; }

    /* ── Left: 3D viewer ── */
    #left-panel {
      flex: none;
      width: 80%;
      height: 100vh;
      position: relative;
    }
    #x3d {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Resizer ── */
    #resizer {
      flex: none;
      width: 5px;
      cursor: col-resize;
      background: #555;
      transition: background .15s;
      z-index: 10;
    }
    #resizer:hover, #resizer.dragging { background: #aaa; }

    /* ── Right: D3 graph ── */
    #right-panel {
      flex: 1;
      height: 100vh;
      background: #1a1a2e;
      position: relative;
      overflow: hidden;
    }
    #graph-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Graph elements ── */
    .link { cursor: pointer; }

    .link .link-hit {
      stroke: transparent;
      stroke-width: 20;
    }
    .link .link-vis {
      stroke: #4a5568;
      stroke-width: 2;
      pointer-events: none;
    }
    .link:hover .link-vis,
    .link.selected .link-vis { stroke: #e94560; stroke-width: 3; }

    .node circle {
      fill: #2d3748;
      stroke: #63b3ed;
      stroke-width: 2;
      cursor: grab;
    }
    .node circle:active { cursor: grabbing; }
    .node circle:hover  { fill: #2b6cb0; }
    .node.selected circle { fill: #e94560; stroke: #fff; }

    .node text {
      fill: #e2e8f0;
      font-size: 11px;
      font-family: 'Segoe UI', sans-serif;
      pointer-events: none;
      user-select: none;
    }

    #drag-line {
      stroke: #e94560;
      stroke-width: 2;
      stroke-dasharray: 6 3;
      pointer-events: none;
    }

    /* ── Mode hint (bottom-left of graph panel) ── */
    #mode-hint {
      position: absolute;
      bottom: 10px;
      left: 10px;
      font-size: 11px;
      font-family: 'Segoe UI', sans-serif;
      color: #718096;
      pointer-events: none;
    }

    /* ── X3D hover tooltip ── */
    #x3d-tooltip {
      display: none;
      position: fixed;
      background: rgba(10, 10, 30, 0.92);
      color: #e2e8f0;
      padding: 6px 13px;
      border-radius: 7px;
      border: 1px solid #4a5568;
      font-size: 13px;
      font-family: 'Segoe UI', sans-serif;
      pointer-events: none;
      z-index: 1000;
      white-space: nowrap;
      box-shadow: 0 2px 10px rgba(0,0,0,.6);
      line-height: 1.5;
    }
    #x3d-tooltip .tt-type {
      font-size: 15px;
      font-weight: 600;
      color: #fbd38d;
    }
    #x3d-tooltip .tt-id {
      font-size: 11px;
      color: #a0aec0;
    }
  </style>
</head>

<body>

  <!-- Left: 3D model (unchanged) -->
  <div id="left-panel">
    <x3d id="x3d">
      <scene>
        <navigationInfo type="EXAMINE" headlight="true" speed="4"></navigationInfo>
        <viewpoint position="0 -10 50" orientation="0 0 0 0" fieldOfView="0.6"></viewpoint>
        <background skyColor="0.75 0.75 0.75"></background>

        <Environment SSAO="true" SSAOradius="0.5"></Environment>

        <!-- geometry injected by fetch below -->
      </scene>
    </x3d>
  </div>

  <!-- Resizer -->
  <div id="resizer"></div>

  <!-- Right: D3 graph editor -->
  <div id="right-panel">
    <svg id="graph-svg"></svg>
    <div id="mode-hint"></div>
  </div>

  <script src="script.js"></script>

</body>
</html>

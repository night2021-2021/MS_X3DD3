<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>X3DOM</title>

  <!-- X3DOM -->
  <link rel="stylesheet" href="https://www.x3dom.org/release/x3dom.css">
  <script src="https://www.x3dom.org/release/x3dom.js"></script>

  <!-- D3 v7 -->
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      height: 100vh;
      background: #fbf8ef;
    }

    /* ── Hide X3DOM built-in UI ── */
    #x3dom-navi, .x3dom-navi,
    .x3dom-progress, .x3dom-logContainer,
    [id^="x3dom-"] > div { display: none !important; }

    /* ── Left: 3D viewer ── */
    #left-panel {
      flex: none;
      width: 85%;
      height: 100vh;
      position: relative;
    }
    #x3d {
      width: 100%;
      height: 100%;
      display: block;
    }

    #camera-axis-widget {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 9;
      width: 112px;
      height: 112px;
      border-radius: 50%;
      background: rgba(28, 28, 32, 0.2);
      user-select: none;
    }

    #camera-axis-lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
      pointer-events: none;
    }

    .camera-axis-line {
      stroke-width: 3;
      stroke-linecap: round;
      opacity: 0.82;
    }

    .camera-axis-line[data-axis="x"] { stroke: #e85d68; }
    .camera-axis-line[data-axis="y"] { stroke: #57c96f; }
    .camera-axis-line[data-axis="z"] { stroke: #559ee8; }

    .camera-axis-end {
      position: absolute;
      left: 56px;
      top: 56px;
      width: 20px;
      height: 20px;
      padding: 0;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(0, 0, 0, 0.42);
      border-radius: 50%;
      color: #fff;
      font: 800 9px/1 'Segoe UI', sans-serif;
      cursor: pointer;
      box-shadow: none;
    }

    .camera-axis-end[data-axis="x"] {
      background: #8f2630;
    }

    .camera-axis-end[data-axis="y"] {
      background: #216f35;
    }

    .camera-axis-end[data-axis="z"] {
      background: #255f99;
    }

    .camera-axis-end[data-sign="-1"] {
      width: 15px;
      height: 15px;
      border-width: 3px;
      background: #fff;
      color: transparent;
      opacity: 1;
    }

    .camera-axis-end[data-axis="x"][data-sign="-1"] { border-color: #8f2630; }
    .camera-axis-end[data-axis="y"][data-sign="-1"] { border-color: #216f35; }
    .camera-axis-end[data-axis="z"][data-sign="-1"] { border-color: #255f99; }

    .camera-axis-end:hover {
      filter: brightness(1.18);
      opacity: 1;
    }

    .camera-axis-end:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 2px;
    }

    #model-bottom-bar {
      position: absolute;
      left: 50%;
      bottom: 18px;
      width: 34%;
      max-width: 300px;
      min-width: 150px;
      height: 12px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: rgba(90, 90, 90, 0.78);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.22);
      transition: background 0.18s ease, box-shadow 0.18s ease;
      z-index: 5;
      cursor: pointer;
    }

    #model-bottom-bar:hover {
      background: rgba(135, 135, 135, 0.9);
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.28);
    }

    #model-bottom-bar:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.75);
      outline-offset: 5px;
    }

    #feature-lights {
      position: absolute;
      left: 50%;
      bottom: 44px;
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 10px 13px;
      transform: translate(-50%, 10px);
      border-radius: 18px;
      background: rgba(28, 28, 32, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.32);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 6;
    }

    #feature-lights.is-open {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, 0);
    }

    #model-data-wheel {
      display: grid;
      grid-template-rows: 12px 24px 12px;
      justify-items: center;
      align-items: center;
      margin-right: 4px;
      padding-right: 10px;
      border-right: 1px solid rgba(255, 255, 255, 0.2);
    }

    #model-data-wheel button {
      width: 28px;
      height: 12px;
      padding: 0;
      border: 0;
      background: transparent;
      color: rgba(255, 255, 255, 0.68);
      font: 800 9px/1 'Segoe UI', sans-serif;
      cursor: pointer;
    }

    #model-data-wheel button:hover,
    #model-data-wheel button:focus-visible {
      color: #ffffff;
      outline: none;
    }

    #model-data-wheel:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.75);
      outline-offset: 4px;
    }

    #model-data-wheel-window {
      position: relative;
      width: 32px;
      height: 24px;
      overflow: hidden;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.34);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(10, 10, 14, 0.32));
      box-shadow: inset 0 1px 4px rgba(255, 255, 255, 0.22),
                  inset 0 -6px 12px rgba(0, 0, 0, 0.24),
                  0 2px 8px rgba(0, 0, 0, 0.28);
    }

    #model-data-wheel-window::before,
    #model-data-wheel-window::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 8px;
      z-index: 2;
      pointer-events: none;
    }

    #model-data-wheel-window::before {
      top: 0;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.42), transparent);
    }

    #model-data-wheel-window::after {
      bottom: 0;
      background: linear-gradient(0deg, rgba(0, 0, 0, 0.42), transparent);
    }

    #model-data-wheel-value {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #ffffff;
      font: 800 13px/1 'Segoe UI', sans-serif;
      font-variant-numeric: tabular-nums;
      user-select: none;
      transform: translateY(0);
    }

    #model-data-wheel.is-rolling-up #model-data-wheel-value {
      animation: model-data-roll-up 180ms ease-out;
    }

    #model-data-wheel.is-rolling-down #model-data-wheel-value {
      animation: model-data-roll-down 180ms ease-out;
    }

    @keyframes model-data-roll-up {
      from { transform: translateY(100%); opacity: 0.25; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes model-data-roll-down {
      from { transform: translateY(-100%); opacity: 0.25; }
      to { transform: translateY(0); opacity: 1; }
    }

    .feature-light {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.32);
      box-shadow: inset 0 1px 3px rgba(255, 255, 255, 0.36),
                  0 2px 8px rgba(0, 0, 0, 0.28);
    }

    .feature-light:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.75);
      outline-offset: 4px;
    }

    .feature-light.is-active {
      box-shadow: inset 0 1px 3px rgba(255, 255, 255, 0.45),
                  0 0 0 3px rgba(255, 255, 255, 0.42),
                  0 3px 10px rgba(0, 0, 0, 0.32);
    }

    .feature-light[data-feature="unit-grid"] { background: #e35d5d; }
    .feature-light[data-feature="axis-markers"] { background: #e8c755; }
    .feature-light[data-feature="axis-layer-planes"] { background: #62c76b; }
    .feature-light[data-feature="ground-projection"] { background: #55a7e8; }
    .feature-light[data-feature="ground-projection-copy"] { background: #c9a7e8; }


    #resizer {
      flex: none;
      width: 5px;
      cursor: col-resize;
      background: #555;
      transition: background .15s;
      z-index: 10;
      touch-action: none;
    }
    #resizer:hover, #resizer.dragging { background: #aaa; }

    body.resizing #x3d,
    body.resizing #graph-svg {
      pointer-events: none;
    }

    /* ── Right: D3 graph ── */
    #right-panel {
      flex: 1;
      height: 100vh;
      background: #fbf8ef;
      position: relative;
      overflow: hidden;
    }
    #graph-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .graph-toggle {
      position: absolute;
      top: 12px;
      z-index: 4;
      width: 34px;
      height: 34px;
      border: 1px solid #4a5568;
      border-radius: 6px;
      background: #2d3748;
      color: #e2e8f0;
      font: 700 13px 'Segoe UI', sans-serif;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.28);
    }

    #bbox-toggle {
      left: 12px;
    }

    #model-visibility-toggle {
      left: 52px;
    }

    #fen-grid-toggle {
      position: absolute;
      top: 12px;
      right: 112px;
      z-index: 7;
      display: none;
    }

    #fen-grid-toggle.is-visible {
      display: block;
    }

    #model-switch-toggle {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 8;
      min-width: 94px;
      height: 34px;
      border: 1px solid #4a5568;
      border-radius: 6px;
      background: #2d3748;
      color: #e2e8f0;
      font: 700 13px 'Segoe UI', sans-serif;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.28);
    }

    #model-switch-toggle:hover {
      background: #3b4a60;
      border-color: #63b3ed;
    }

    #model-switch-toggle:focus-visible {
      outline: 2px solid #63b3ed;
      outline-offset: 3px;
    }

    .graph-toggle:hover {
      background: #3b4a60;
      border-color: #63b3ed;
    }

    .graph-toggle:focus-visible {
      outline: 2px solid #63b3ed;
      outline-offset: 3px;
    }

    .graph-toggle.is-active {
      background: #e94560;
      border-color: #fbd38d;
      color: #ffffff;
    }

    /* ── Graph elements ── */
    .link { cursor: pointer; }

    .link .link-hit {
      stroke: transparent;
      stroke-width: 20;
    }
    .link .link-vis {
      stroke: #4a5568;
      stroke-width: 2;
      pointer-events: none;
    }
    .link:hover .link-vis,
    .link.selected .link-vis { stroke: #e94560; stroke-width: 3; }

    .node circle {
      fill: #fbf8ef;
      stroke: #4a4a4a;
      stroke-width: 2;
      cursor: grab;
    }
    .node circle:active { cursor: grabbing; }
    .node circle:hover  { fill: #ffffff; stroke: #2f2f2f; }
    .node.selected circle { fill: #fbf8ef; stroke: #2f2f2f; }

    .node text {
      fill: #000000;
      font-size: 11px;
      font-family: 'Segoe UI', sans-serif;
      pointer-events: none;
      user-select: none;
    }

    #drag-line {
      stroke: #e94560;
      stroke-width: 2;
      stroke-dasharray: 6 3;
      pointer-events: none;
    }

    /* ── Mode hint (bottom-left of graph panel) ── */
    #mode-hint {
      position: absolute;
      bottom: 68px;
      left: 10px;
      font-size: 11px;
      font-family: 'Segoe UI', sans-serif;
      color: #718096;
      pointer-events: none;
    }

    .node-nav {
      position: absolute;
      left: 50%;
      bottom: 18px;
      display: flex;
      gap: 10px;
      transform: translateX(-50%);
      z-index: 4;
    }

    .node-nav button {
      min-width: 72px;
      height: 34px;
      border: 1px solid #4a5568;
      border-radius: 6px;
      background: #2d3748;
      color: #e2e8f0;
      font: 600 13px 'Segoe UI', sans-serif;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.28);
    }

    .node-nav button:hover {
      background: #3b4a60;
      border-color: #63b3ed;
    }

    .node-nav button:focus-visible {
      outline: 2px solid #63b3ed;
      outline-offset: 3px;
    }

    .node-nav button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    /* ── X3D hover tooltip ── */
    #x3d-tooltip {
      display: none;
      position: fixed;
      background: rgba(10, 10, 30, 0.92);
      color: #e2e8f0;
      padding: 6px 13px;
      border-radius: 7px;
      border: 1px solid #ebe0bf;
      font-size: 13px;
      font-family: 'Segoe UI', sans-serif;
      pointer-events: none;
      z-index: 1000;
      white-space: nowrap;
      box-shadow: 0 2px 10px rgba(0,0,0,.6);
      line-height: 1.5;
    }
    #x3d-tooltip .tt-type {
      font-size: 15px;
      font-weight: 600;
      color: #fff8e8;
    }
    #x3d-tooltip .tt-id {
      font-size: 11px;
      color: #a0aec0;
    }
    #selected-part-label {
      display: none;
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 10, 30, 0.9);
      color: #e2e8f0;
      padding: 8px 16px;
      border-radius: 7px;
      border: 1px solid #fbd38d;
      font-family: 'Segoe UI', sans-serif;
      pointer-events: none;
      z-index: 1001;
      white-space: nowrap;
      box-shadow: 0 2px 12px rgba(0,0,0,.55);
      line-height: 1.45;
      text-align: center;
    }
    #selected-part-label .tt-type {
      font-size: 15px;
      font-weight: 600;
      color: #fbd38d;
    }
    #selected-part-label .tt-id {
      font-size: 11px;
      color: #a0aec0;
    }
  </style>
</head>

<body>

  <!-- Left: 3D model (unchanged) -->
  <div id="left-panel">
    <div id="camera-axis-widget" aria-label="相機軸向視角">
      <svg id="camera-axis-lines" viewBox="0 0 112 112" aria-hidden="true">
        <line class="camera-axis-line" data-axis="x"></line>
        <line class="camera-axis-line" data-axis="y"></line>
        <line class="camera-axis-line" data-axis="z"></line>
      </svg>
      <button class="camera-axis-end" type="button" data-axis="x" data-sign="1" aria-label="Positive X view">X</button>
      <button class="camera-axis-end" type="button" data-axis="x" data-sign="-1" aria-label="Negative X view">X</button>
      <button class="camera-axis-end" type="button" data-axis="y" data-sign="1" aria-label="Positive Y view">Y</button>
      <button class="camera-axis-end" type="button" data-axis="y" data-sign="-1" aria-label="Negative Y view">Y</button>
      <button class="camera-axis-end" type="button" data-axis="z" data-sign="1" aria-label="Positive Z view">Z</button>
      <button class="camera-axis-end" type="button" data-axis="z" data-sign="-1" aria-label="Negative Z view">Z</button>
    </div>
    <button id="model-switch-toggle" type="button" aria-label="開啟 Palace 模型展示分頁">Palace Viewer</button>
    <x3d id="x3d">
      <scene>
        <navigationInfo type="EXAMINE" headlight="true" speed="1"></navigationInfo>
        <viewpoint position="0 -11.642880 50" orientation="0 0 0 0" fieldOfView="0.6"></viewpoint>
        <background skyColor="0.984 0.973 0.937"></background>

        <Environment SSAO="true" SSAOradius="0.5"></Environment>

        <transform id="model-ground-plane" translation="0 -20 0">
          <shape>
            <appearance>
              <material diffuseColor="0.35 0.35 0.35" transparency="0.88"></material>
            </appearance>
            <box size="1000 0.01 1000"></box>
          </shape>
        </transform>

        <!-- geometry injected by fetch below -->
      </scene>
    </x3d>
    <div id="feature-lights" aria-hidden="true">
      <div id="model-data-wheel" role="spinbutton" tabindex="0" aria-label="選擇模型" aria-valuemin="4" aria-valuemax="6" aria-valuenow="4">
        <button id="model-data-up" type="button" aria-label="上一個模型">▲</button>
        <span id="model-data-wheel-window" aria-hidden="true">
          <span id="model-data-wheel-value">4</span>
        </span>
        <button id="model-data-down" type="button" aria-label="下一個模型">▼</button>
      </div>
      <span class="feature-light" role="button" tabindex="0" data-feature="unit-grid" title="立方格線"></span>
      <span class="feature-light" role="button" tabindex="0" data-feature="axis-markers" title="XYZ 軸標記"></span>
      <span class="feature-light" role="button" tabindex="0" data-feature="axis-layer-planes" title="XYZ 軸切層"></span>
      <span class="feature-light" role="button" tabindex="0" data-feature="ground-projection" title="地面投影"></span>
      <span class="feature-light" role="button" tabindex="0" data-feature="ground-projection-copy" title="剖面空區"></span>
    </div>
    <button id="fen-grid-toggle" class="graph-toggle is-active" type="button" aria-pressed="true" title="細線">ON</button>
    <div id="model-bottom-bar" role="button" tabindex="0" aria-label="功能選單" aria-expanded="false"></div>
  </div>

  <!-- Resizer -->
  <div id="resizer"></div>

  <!-- Right: D3 graph editor -->
  <div id="right-panel">
    <button id="bbox-toggle" class="graph-toggle" type="button" aria-pressed="false" title="Bounding boxes">BB</button>
    <button id="model-visibility-toggle" class="graph-toggle" type="button" aria-pressed="false" title="只保留 bounding box">AA</button>
    <svg id="graph-svg"></svg>
    <div id="mode-hint"></div>
    <div class="node-nav" aria-label="Node navigation">
      <button id="layer-back" type="button">Back</button>
      <button id="layer-next" type="button">Next</button>
    </div>
  </div>

  <script>
    (function bootstrapSelectedModel() {
      const params = new URLSearchParams(window.location.search);
      const requested = params.get('modelData');
      const selected = ['4', '5', '6'].includes(requested) ? requested : '4';
      window.SELECTED_MODEL_DATA = selected;

      function loadScript(src, onload) {
        const script = document.createElement('script');
        script.src = src;
        script.onload = onload;
        document.body.appendChild(script);
      }

      loadScript(`model-data-${selected}.js`, () => {
        loadScript('chaiqi.js', () => {
          loadScript('graph.js');
        });
      });
    })();
  </script>

</body>
</html>

<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>模型瀏覽器</title>

  <link rel="stylesheet" href="https://www.x3dom.org/release/x3dom.css">
  <script src="https://www.x3dom.org/release/x3dom.js"></script>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #bfbfbf;
    }

    #x3dom-navi, .x3dom-navi,
    .x3dom-progress, .x3dom-logContainer,
    [id^="x3dom-"] > div { display: none !important; }

    #viewer-panel {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #x3d {
      display: block;
      width: 100%;
      height: 100%;
    }

    #camera-axis-widget {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 9;
      width: 112px;
      height: 112px;
      border-radius: 50%;
      background: rgba(28, 28, 32, 0.2);
      user-select: none;
    }

    #camera-axis-lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
      pointer-events: none;
    }

    .camera-axis-line {
      stroke-width: 3;
      stroke-linecap: round;
      opacity: 0.82;
    }

    .camera-axis-line[data-axis="x"] { stroke: #e85d68; }
    .camera-axis-line[data-axis="y"] { stroke: #57c96f; }
    .camera-axis-line[data-axis="z"] { stroke: #559ee8; }

    .camera-axis-end {
      position: absolute;
      left: 56px;
      top: 56px;
      width: 20px;
      height: 20px;
      padding: 0;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(0, 0, 0, 0.42);
      border-radius: 50%;
      color: #fff;
      font: 800 9px/1 "Segoe UI", sans-serif;
      cursor: pointer;
      box-shadow: none;
    }

    .camera-axis-end[data-axis="x"] { background: #8f2630; }
    .camera-axis-end[data-axis="y"] { background: #216f35; }
    .camera-axis-end[data-axis="z"] { background: #255f99; }

    .camera-axis-end[data-sign="-1"] {
      width: 15px;
      height: 15px;
      border-width: 3px;
      background: #fff;
      color: transparent;
      opacity: 1;
    }

    .camera-axis-end[data-axis="x"][data-sign="-1"] { border-color: #8f2630; }
    .camera-axis-end[data-axis="y"][data-sign="-1"] { border-color: #216f35; }
    .camera-axis-end[data-axis="z"][data-sign="-1"] { border-color: #255f99; }

    .camera-axis-end:hover {
      filter: brightness(1.18);
      opacity: 1;
    }

    .camera-axis-end:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 2px;
    }

    #viewer-status {
      position: absolute;
      z-index: 8;
      border: 1px solid #4a5568;
      border-radius: 6px;
      background: #2d3748;
      color: #e2e8f0;
      font: 700 13px "Segoe UI", sans-serif;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.28);
    }

    #viewer-status {
      right: 12px;
      bottom: 12px;
      padding: 8px 10px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.16s ease;
    }

    #viewer-status.is-visible {
      opacity: 1;
    }

    /* ── Sidebar ── */
    #model-sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      z-index: 20;
    }

    #sidebar-panel {
      position: absolute;
      top: 0;
      left: 0;
      width: 280px;
      height: 100%;
      background: rgba(18, 22, 34, 0.96);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      transform: translateX(-280px);
      transition: transform 0.22s cubic-bezier(.4, 0, .2, 1);
      box-shadow: 4px 0 20px rgba(0, 0, 0, 0.5);
      border-right: 1px solid #2d3748;
    }

    #model-sidebar.is-open #sidebar-panel {
      transform: translateX(0);
    }

    #sidebar-toggle {
      position: fixed;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 64px;
      background: rgba(18, 22, 34, 0.88);
      border: 1px solid #4a5568;
      border-left: none;
      border-radius: 0 6px 6px 0;
      color: #a0aec0;
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
      transition: left 0.22s cubic-bezier(.4, 0, .2, 1), color 0.12s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.4);
      z-index: 21;
    }

    #sidebar-toggle:hover {
      color: #e2e8f0;
      background: rgba(45, 55, 72, 0.95);
    }

    #model-sidebar.is-open #sidebar-toggle {
      left: 280px;
    }

    #sidebar-header {
      padding: 14px 16px 12px;
      font: 600 11px/1 "Segoe UI", sans-serif;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-bottom: 1px solid #2d3748;
      flex-shrink: 0;
    }

    #model-list {
      list-style: none;
      margin: 0;
      padding: 4px 0;
      overflow-y: auto;
      flex: 1;
      scrollbar-width: thin;
      scrollbar-color: #4a5568 transparent;
    }

    #model-list::-webkit-scrollbar { width: 4px; }
    #model-list::-webkit-scrollbar-track { background: transparent; }
    #model-list::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 2px; }

    #model-list li {
      padding: 6px 12px 6px 16px;
      font: 12.5px/1.4 "Segoe UI", sans-serif;
      color: #a0aec0;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s, color 0.1s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #model-list li:hover {
      background: rgba(255, 255, 255, 0.07);
      color: #e2e8f0;
    }

    #model-list li.is-active {
      background: rgba(49, 130, 206, 0.14);
      color: #63b3ed;
      border-left-color: #3182ce;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <main id="viewer-panel">
    <div id="camera-axis-widget" aria-label="Camera axis">
      <svg id="camera-axis-lines" viewBox="0 0 112 112" aria-hidden="true">
        <line class="camera-axis-line" data-axis="x"></line>
        <line class="camera-axis-line" data-axis="y"></line>
        <line class="camera-axis-line" data-axis="z"></line>
      </svg>
      <button class="camera-axis-end" type="button" data-axis="x" data-sign="1" aria-label="Positive X view">X</button>
      <button class="camera-axis-end" type="button" data-axis="x" data-sign="-1" aria-label="Negative X view">X</button>
      <button class="camera-axis-end" type="button" data-axis="y" data-sign="1" aria-label="Positive Y view">Y</button>
      <button class="camera-axis-end" type="button" data-axis="y" data-sign="-1" aria-label="Negative Y view">Y</button>
      <button class="camera-axis-end" type="button" data-axis="z" data-sign="1" aria-label="Positive Z view">Z</button>
      <button class="camera-axis-end" type="button" data-axis="z" data-sign="-1" aria-label="Negative Z view">Z</button>
    </div>

    <div id="viewer-status" role="status"></div>

    <x3d id="x3d" showStat="false" showLog="false">
      <param name="PrimitiveQuality" value="low"></param>
      <scene>
        <navigationInfo type="EXAMINE" headlight="true" speed="1" transitionType='"ANIMATE"'></navigationInfo>
        <viewpoint position="0 8 80" orientation="0 1 0 0" centerOfRotation="0 8 0" fieldOfView="0.7"></viewpoint>
        <background skyColor="0.75 0.75 0.75"></background>
      </scene>
    </x3d>
  </main>

  <aside id="model-sidebar">
    <div id="sidebar-panel">
      <div id="sidebar-header">模型選單</div>
      <ul id="model-list" role="listbox" aria-label="選擇模型"></ul>
    </div>
    <button id="sidebar-toggle" type="button" aria-label="展開選單">&#9776;</button>
  </aside>

  <script src="library.js"></script>
  <script src="model-data.js"></script>
  <script src="viewer.js"></script>
</body>
</html>

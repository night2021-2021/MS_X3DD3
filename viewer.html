<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Model Viewer</title>

  <link rel="stylesheet" href="https://www.x3dom.org/release/x3dom.css">
  <script src="https://www.x3dom.org/release/x3dom.js"></script>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #bfbfbf;
    }

    #x3dom-navi, .x3dom-navi,
    .x3dom-progress, .x3dom-logContainer,
    [id^="x3dom-"] > div { display: none !important; }

    #viewer-panel {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #x3d {
      display: block;
      width: 100%;
      height: 100%;
    }

    #camera-axis-widget {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 9;
      width: 112px;
      height: 112px;
      border-radius: 50%;
      background: rgba(28, 28, 32, 0.2);
      user-select: none;
    }

    #camera-axis-lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
      pointer-events: none;
    }

    .camera-axis-line {
      stroke-width: 3;
      stroke-linecap: round;
      opacity: 0.82;
    }

    .camera-axis-line[data-axis="x"] { stroke: #e85d68; }
    .camera-axis-line[data-axis="y"] { stroke: #57c96f; }
    .camera-axis-line[data-axis="z"] { stroke: #559ee8; }

    .camera-axis-end {
      position: absolute;
      left: 56px;
      top: 56px;
      width: 20px;
      height: 20px;
      padding: 0;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(0, 0, 0, 0.42);
      border-radius: 50%;
      color: #fff;
      font: 800 9px/1 "Segoe UI", sans-serif;
      cursor: pointer;
      box-shadow: none;
    }

    .camera-axis-end[data-axis="x"] { background: #8f2630; }
    .camera-axis-end[data-axis="y"] { background: #216f35; }
    .camera-axis-end[data-axis="z"] { background: #255f99; }

    .camera-axis-end[data-sign="-1"] {
      width: 15px;
      height: 15px;
      border-width: 3px;
      background: #fff;
      color: transparent;
      opacity: 1;
    }

    .camera-axis-end[data-axis="x"][data-sign="-1"] { border-color: #8f2630; }
    .camera-axis-end[data-axis="y"][data-sign="-1"] { border-color: #216f35; }
    .camera-axis-end[data-axis="z"][data-sign="-1"] { border-color: #255f99; }

    .camera-axis-end:hover {
      filter: brightness(1.18);
      opacity: 1;
    }

    .camera-axis-end:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 2px;
    }

    #viewer-status {
      position: absolute;
      z-index: 8;
      border: 1px solid #4a5568;
      border-radius: 6px;
      background: #2d3748;
      color: #e2e8f0;
      font: 700 13px "Segoe UI", sans-serif;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.28);
    }

    #viewer-status {
      right: 12px;
      bottom: 12px;
      padding: 8px 10px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.16s ease;
    }

    #viewer-status.is-visible {
      opacity: 1;
    }
  </style>
</head>

<body>
  <main id="viewer-panel">
    <div id="camera-axis-widget" aria-label="Camera axis">
      <svg id="camera-axis-lines" viewBox="0 0 112 112" aria-hidden="true">
        <line class="camera-axis-line" data-axis="x"></line>
        <line class="camera-axis-line" data-axis="y"></line>
        <line class="camera-axis-line" data-axis="z"></line>
      </svg>
      <button class="camera-axis-end" type="button" data-axis="x" data-sign="1" aria-label="Positive X view">X</button>
      <button class="camera-axis-end" type="button" data-axis="x" data-sign="-1" aria-label="Negative X view">X</button>
      <button class="camera-axis-end" type="button" data-axis="y" data-sign="1" aria-label="Positive Y view">Y</button>
      <button class="camera-axis-end" type="button" data-axis="y" data-sign="-1" aria-label="Negative Y view">Y</button>
      <button class="camera-axis-end" type="button" data-axis="z" data-sign="1" aria-label="Positive Z view">Z</button>
      <button class="camera-axis-end" type="button" data-axis="z" data-sign="-1" aria-label="Negative Z view">Z</button>
    </div>

    <div id="viewer-status" role="status"></div>

    <x3d id="x3d" showStat="false" showLog="false">
      <param name="PrimitiveQuality" value="low"></param>
      <scene>
        <navigationInfo type="EXAMINE" headlight="true" speed="1" transitionType='"ANIMATE"'></navigationInfo>
        <viewpoint position="0 8 80" orientation="0 1 0 0" centerOfRotation="0 8 0" fieldOfView="0.7"></viewpoint>
        <background skyColor="0.75 0.75 0.75"></background>
      </scene>
    </x3d>
  </main>

  <script src="model-data.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
